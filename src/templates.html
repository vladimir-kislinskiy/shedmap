<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="#" type="image/x-icon">
	<meta name="description" content="#">
	<title>Templates</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

	<!-- Wrap -->
	<div class="wrap flex-c" style="gap: 30px; padding: 50px 30px;">

		<!-- Custom select -->
		<div class="custom-select">
			<select>
				<option value="hide">Select car:</option>
				<option value="1">Audi</option>
				<option value="2">BMW</option>
				<option value="3">Citroen</option>
				<option value="4">Ford</option>
				<option value="5">Honda</option>
			</select>
		</div>

		<!-- Checkbox -->
		<label class="check-wrap">
			<input class="check-input" type="checkbox">
			<span class="check-style"></span>
			Custom checkbox
		</label>

		<!-- Radiobox -->
		<div>
			<label class="radio-wrap"><input name="shipping" class="radio-input" type="radio"><span
					class="radio-style"></span>2-day
				delivery
			</label>
			<label class="radio-wrap"><input name="shipping" class="radio-input" type="radio"><span
					class="radio-style"></span>2-day
				delivery
			</label>
		</div>

		<!-- Hover button -->
		<div class="btn-hover">
			<span>Button hover</span>
		</div>

		<!-- Link hover -->
		<div>
			<a class="link-hover" href="#">Link hover</a>
		</div>

		<!-- Switcher -->
		<label class="switcher">
			<input type="checkbox" checked>
			<span class="switcher__slider"></span>
		</label>

		<!-- Search input -->
		<div class="search-input" style="border: 1px solid #000;">
			<input type="text" placeholder="Search">
			<div class="search-input__reset is-hidden"></div>
		</div>

		<!-- Password input -->
		<span class="password-input__wrap">
			<input class="password-input input-global" type="password" placeholder="Enter your password" required>
			<span class="password-input__show-btn is-hidden"></span>
		</span>

		<span class="password-input__wrap">
			<input class="password-input input-global" type="password" placeholder="Repeat your password" required>
			<span class="password-input__show-btn is-hidden"></span>
		</span>

		<!-- To top btn -->
		<div class="scroll-top" id="scrollTop">
			<img src="./img/icons/arrow-up.svg" alt="Scroll to top">
		</div>

		<!-- Input type range -->
		<div class="input-range">
			<div class="input-range__label"></div>
			<input type="range" value='65' min="0" max="100" autocomplete="off">
		</div>

	</div><!-- Wrap -->

	<script src="./js/main.js"></script>
</body>

</html>
