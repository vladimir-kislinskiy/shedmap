<div class="shed__bay shed__bay--disabled" data-bay="@index" data-num="@num" aria-hidden="true">
	<div class="shed__bay-label shed__bay-label--olds" aria-hidden="true">
		<span class="shed__bay-num">@numLeft</span>
		<span class="shed__bay-num">@numRight</span>
	</div>
	<div class="shed__bay-stack">
		<div class="shed__isles">
			<div class="shed__isle shed__isle--1"></div>
			<div class="shed__isle shed__isle--2"></div>
		</div>
		<div class="shed__bay-stack-tail" aria-hidden="true"></div>
	</div>
	<div class="shed__bay-stats">
		<div class="shed__bay-total"><span class="shed__bay-total-val">0</span></div>
		<span class="shed__bay-fill">0% full</span>
	</div>
	<div class="shed__bay-exit" aria-hidden="true">
		<span class="shed__bay-num">@numLeft</span>
		<span class="shed__bay-num">@numRight</span>
	</div>
</div>
