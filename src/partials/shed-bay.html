<div class="shed__bay" data-bay="@index" data-num="@num">
	<div class="shed__bay-label" aria-hidden="true">@num</div>
	<div class="shed__bay-stack" id="@prefix@shed-col-@index" data-location="@location" data-shed="@shed" data-bay="@index">
		<div class="shed__isles">
			<div class="shed__isle shed__isle--1" data-isle="1"></div>
			<div class="shed__isle shed__isle--2" data-isle="2"></div>
		</div>
		<div class="shed__bay-stack-tail" aria-hidden="true"></div>
	</div>
	<div class="shed__bay-stats">
		<div class="shed__bay-total"><span class="shed__bay-total-val">0</span></div>
		<span class="shed__bay-fill">0% full</span>
	</div>
	<div class="shed__bay-exit" aria-hidden="true">
		<span class="shed__bay-num">@num</span>
	</div>
</div>
