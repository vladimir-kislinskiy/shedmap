<script>
	(function () {
		var root = document.documentElement;
		root.classList.add("theme-crm");
		if (window.localStorage && localStorage.getItem("uiCrmDark") === "1") {
			root.classList.add("theme-dark");
		}
	})();
</script>
<style>
	html {
		background-color: #eef1f5;
	}

	html.theme-dark {
		background-color: #21262d;
	}
</style>
